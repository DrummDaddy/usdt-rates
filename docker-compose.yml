services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: usdt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usdt"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GRPC_ADDR: ":50051"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/usdt?sslmode=disable"
      GRINEX_DEPTH_URL: "https://grinex.io/api/v1/spot/depth"
      GRINEX_TIMEOUT: "5s"
      OTEL_OTLP_GRPC_ENDPOINT: ""
      OTEL_SERVICE_NAME: "usdt-rates"
    ports:
      - "50051:50051"

volumes:
  pgdata:
